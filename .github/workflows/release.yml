name: Release

# Fork build: no code signing (SignPath secrets live in the upstream repo only).
# Pushing a tag like v0.264-vivofan.1 builds GHelper.exe and publishes a release with it.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create'
        required: false
        default: 'v0.264-vivofan.1'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v7
    - name: Setup dotnet
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Publish
      run: |
        dotnet publish app/GHelper.csproj --configuration Release --runtime win-x64 -p:PublishSingleFile=true --no-self-contained

    - name: Create ZIP
      run: powershell Compress-Archive app/bin/x64/Release/net8.0-windows/win-x64/publish/GHelper.exe ./GHelper.zip

    - name: Upload workflow artifact
      uses: actions/upload-artifact@v7
      with:
        name: GHelper
        path: |
          app/bin/x64/Release/net8.0-windows/win-x64/publish/GHelper.exe
          GHelper.zip

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        target_commitish: ${{ github.sha }}
        files: GHelper.zip
        name: "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }} — Vivobook V16 software fan control"
        body: |
          G-Helper build with a software fan control fallback (AsusWinIO64) for Vivobook / V16
          models whose firmware does not support ACPI fan curves.

          **Requirements:**
          - MyASUS / ASUS System Control Interface installed (ASUS System Analysis service running)
          - .NET 8 Desktop Runtime
          - Run as administrator (G-Helper asks automatically)

          **How to test:** open Fans + Power, adjust the CPU fan curve and hit Apply.
          The status label should say "Software fan control active (AsusWinIO)" and fan
          speed should follow CPU temperature. On app exit / sleep, fan control is
          returned to the EC automatically.
